<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casper Agentic Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 { font-size: 20px; font-weight: 600; color: #fff; }
    header .badge {
      background: #e63946; color: #fff; font-size: 11px;
      padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }
    header .net-badge {
      background: #2a2a4a; color: #aaa; font-size: 11px;
      padding: 2px 8px; border-radius: 10px; margin-left: auto;
    }
    .chat-container {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message {
      max-width: 80%; padding: 12px 16px;
      border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap;
    }
    .message.user {
      background: #1a3a5c; align-self: flex-end; border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: #1e1e32; align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .message.bot.loading { opacity: 0.6; }
    .input-area {
      padding: 16px 20px; background: #12122a;
      border-top: 1px solid #2a2a4a; display: flex; gap: 10px;
    }
    .input-area input {
      flex: 1; background: #1a1a30; border: 1px solid #333;
      border-radius: 8px; padding: 12px 16px; color: #e0e0e0;
      font-size: 14px; outline: none;
    }
    .input-area input:focus { border-color: #4a4a8a; }
    .input-area button {
      background: #4a4a8a; color: #fff; border: none; border-radius: 8px;
      padding: 12px 24px; font-size: 14px; cursor: pointer; font-weight: 600;
      transition: background 0.2s;
    }
    .input-area button:hover { background: #5a5aaa; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .suggestions {
      display: flex; gap: 8px; padding: 0 20px 16px; flex-wrap: wrap;
    }
    .suggestions button {
      background: #1e1e32; border: 1px solid #333; border-radius: 16px;
      padding: 6px 14px; color: #aaa; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .suggestions button:hover { border-color: #4a4a8a; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Casper Agentic Bot</h1>
    <span class="badge">AI</span>
    <span class="net-badge" id="networkBadge">testnet</span>
  </header>

  <div class="chat-container" id="chatContainer">
    <div class="message bot">
      Hi! I'm an AI agent that can query the Casper blockchain. Try asking:

      • "What's the current network status?"
      • "Show me the latest 5 blocks"
      • "Get account info for [account hash]"
      • "List active validators"
      • "What's the total CSPR supply?"
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button onclick="sendSuggestion('What is the current network status?')">Network Status</button>
    <button onclick="sendSuggestion('Show me the latest 5 blocks')">Latest Blocks</button>
    <button onclick="sendSuggestion('List the validators')">Validators</button>
    <button onclick="sendSuggestion('What is the total CSPR supply?')">CSPR Supply</button>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Ask about the Casper blockchain..." autofocus />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showLoading() {
      const div = document.createElement('div');
      div.className = 'message bot loading';
      div.id = 'loadingMsg';
      div.textContent = 'Thinking...';
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loadingMsg');
      if (el) el.remove();
    }

    async function sendMessage() {
      const msg = messageInput.value.trim();
      if (!msg) return;
      messageInput.value = '';
      addMessage(msg, 'user');
      showLoading();
      sendBtn.disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();
        removeLoading();
        if (data.error) {
          addMessage('Error: ' + data.error, 'bot');
        } else {
          addMessage(data.reply, 'bot');
        }
      } catch {
        removeLoading();
        addMessage('Error: Could not reach the server.', 'bot');
      }
      sendBtn.disabled = false;
    }

    function sendSuggestion(text) {
      messageInput.value = text;
      sendMessage();
    }

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
