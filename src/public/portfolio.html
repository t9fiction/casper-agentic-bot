<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casper Agentic Bot — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:      #0A0E1A;
      --bg-secondary:    #0D1B2A;
      --bg-card:         #111827;
      --accent-teal:     #00D4C8;
      --accent-teal-dim: #00A89E;
      --accent-green:    #1DB954;
      --accent-purple:   #A78BFA;
      --accent-pink:     #F472B6;
      --text-primary:    #FFFFFF;
      --text-secondary:  #A0AEC0;
      --text-muted:      #6B7280;
      --border:          #1E293B;
      --radius-pill:     9999px;
      --radius-card:     12px;
      --radius-input:    8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    header {
      background: rgba(10, 14, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
    }
    header .logo {
      width: 32px; height: 32px;
      background: var(--accent-teal);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; color: #0A0E1A;
    }
    header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    }
    header .badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 9999px;
      background: rgba(0, 212, 200, 0.12);
      color: var(--accent-teal);
      border: 1px solid rgba(0, 212, 200, 0.2);
      letter-spacing: 0.03em;
    }
    header .nav-links {
      display: flex; align-items: center; gap: 2px;
      margin-left: auto;
      background: var(--bg-card);
      border-radius: var(--radius-input);
      padding: 3px;
      border: 1px solid var(--border);
    }
    header .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 5px 14px;
      border-radius: 5px;
      font-size: 12px; font-weight: 500;
      transition: all .2s;
    }
    header .nav-links a:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
    }
    header .nav-links a.active {
      background: var(--accent-teal);
      color: #0A0E1A;
      font-weight: 600;
    }
    header .wallet-btn {
      margin-left: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 6px 16px;
      font-size: 12px; font-weight: 500;
      color: var(--accent-teal);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    header .wallet-btn:hover {
      border-color: var(--accent-teal);
      background: rgba(0, 212, 200, 0.06);
    }
    header .wallet-btn.connected {
      color: var(--accent-green);
      border-color: rgba(29, 185, 84, 0.3);
    }
    header .wallet-btn .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
    }
    .connect-prompt {
      text-align: center;
      padding: 80px 20px;
    }
    .connect-prompt h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      margin-bottom: 12px;
    }
    .connect-prompt p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .connect-prompt button {
      background: var(--accent-teal);
      color: #0A0E1A;
      border: none;
      border-radius: var(--radius-pill);
      padding: 12px 32px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
    }
    .connect-prompt button:hover {
      background: var(--accent-teal-dim);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 212, 200, 0.3);
    }
    header .network-badge {
      display: flex; align-items: center; gap: 6px;
      margin-left: 12px;
      font-size: 12px; color: var(--text-muted);
      background: var(--bg-card); padding: 6px 14px;
      border-radius: var(--radius-input);
      border: 1px solid var(--border);
    }
    header .network-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 6px rgba(29, 185, 84, 0.5);
    }

    .page {
      flex: 1;
      padding: 32px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-title {
      font-family: 'Poppins', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-desc {
      font-size: 13px; color: var(--text-muted);
      margin-top: 4px;
    }

    .wallet-addr {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      font-size: 12px;
      color: var(--accent-teal);
      font-family: 'Inter', monospace;
      display: flex; align-items: center; gap: 8px;
    }
    .wallet-addr .copy-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px;
    }
    .wallet-addr .copy-btn:hover { color: var(--accent-teal); }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color .2s;
    }
    .summary-card:hover { border-color: rgba(0, 212, 200, 0.3); }
    .summary-card .label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-card .value {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }
    .summary-card .value.cspr { color: var(--accent-teal); }
    .summary-card .value.tokens { color: var(--accent-green); }
    .summary-card .value.nfts { color: var(--accent-purple); }
    .summary-card .value.contracts { color: var(--accent-pink); }
    .summary-card .sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Section */
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title .count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Token / NFT cards */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .asset-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .2s;
    }
    .asset-card:hover { border-color: rgba(0, 212, 200, 0.25); }
    .asset-card .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .asset-card .name {
      font-weight: 600;
      font-size: 14px;
    }
    .asset-card .symbol {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }
    .asset-card .balance {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
    }
    .asset-card .balance.token-bal { color: var(--accent-green); }
    .asset-card .balance.nft-bal { color: var(--accent-purple); }
    .asset-card .meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .asset-card .meta a {
      color: var(--accent-teal);
      text-decoration: none;
    }
    .asset-card .meta a:hover { text-decoration: underline; }
    .asset-card .badge-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
    }
    .asset-card .badge-status.listed {
      background: rgba(0, 212, 200, 0.12);
      color: var(--accent-teal);
    }
    .asset-card .badge-status.unlisted {
      background: rgba(107, 114, 128, 0.12);
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: var(--radius-card);
    }
    .empty-state h4 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }
    .empty-state p { font-size: 13px; }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-bar {
      display: flex;
      justify-content: flex-end;
    }
    .refresh-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover {
      border-color: var(--accent-teal);
      color: var(--accent-teal);
    }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 600px) {
      header { padding: 0 12px; gap: 6px; height: 52px; }
      header h1 { font-size: 13px; }
      header .badge { display: none; }
      header .nav-links a { padding: 4px 8px; font-size: 11px; }
      header .network-badge { display: none; }
      .page { padding: 16px 12px; }
      .page-title { font-size: 20px; }
      .summary-card .value { font-size: 22px; }
      .wallet-addr { font-size: 10px; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">C</div>
    <h1>Casper Agentic</h1>
    <span class="badge">AI Agent</span>
    <div class="nav-links">
      <a href="/">Chat</a>
      <a href="/portfolio" class="active">Portfolio</a>
    </div>
    <button class="wallet-btn" id="walletBtn" onclick="toggleWallet()">Connect Wallet</button>
    <div class="network-badge"><span class="dot"></span>Casper Testnet</div>
  </header>

  <div class="page" id="app">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <p>Loading portfolio...</p>
    </div>
  </div>

  <script>
    let portfolioData = null;
    let walletPk = localStorage.getItem('casper_public_key') || '';
    let walletExtensionDetected = false;

    /* ─── Wallet UI ─── */
    function updateWalletUI() {
      const btn = document.getElementById('walletBtn');
      if (walletPk) {
        const short = walletPk.length > 16 ? walletPk.slice(0, 8) + '...' + walletPk.slice(-4) : walletPk;
        btn.innerHTML = `<span class="dot"></span> ${short}`;
        btn.className = 'wallet-btn connected';
        btn.title = 'Click to disconnect';
      } else {
        btn.innerHTML = 'Connect Wallet';
        btn.className = 'wallet-btn';
        btn.title = '';
      }
    }

    async function onWalletReady() {
      walletExtensionDetected = true;
      const storedPk = localStorage.getItem('casper_public_key');
      if (storedPk && window.casperWallet) {
        try {
          const connected = await window.casperWallet.isConnected();
          if (connected) {
            const activePk = await window.casperWallet.getActivePublicKey();
            if (activePk) {
              walletPk = activePk;
              localStorage.setItem('casper_public_key', activePk);
              updateWalletUI();
              loadPortfolio(walletPk);
              return;
            }
          }
        } catch { /* fall through */ }
      }
      walletPk = '';
      localStorage.removeItem('casper_public_key');
      updateWalletUI();
      showConnectPrompt();
    }

    window.addEventListener('casperWallet:ready', onWalletReady);

    window.addEventListener('casperWallet:connected', function(e) {
      const pk = e.detail && (e.detail.publicKey || e.detail.activeKey);
      if (pk) {
        walletPk = pk;
        localStorage.setItem('casper_public_key', pk);
        updateWalletUI();
        loadPortfolio(walletPk);
      }
    });

    window.addEventListener('casperWallet:disconnected', function() {
      walletPk = '';
      localStorage.removeItem('casper_public_key');
      updateWalletUI();
      showConnectPrompt();
    });

    async function toggleWallet() {
      if (walletPk) {
        walletPk = '';
        localStorage.removeItem('casper_public_key');
        updateWalletUI();
        showConnectPrompt();
        return;
      }
      if (!window.casperWallet) {
        alert('Please install the Casper Wallet browser extension to connect.');
        return;
      }
      try {
        const res = await window.casperWallet.requestConnection();
        if (res && res.publicKey) {
          walletPk = res.publicKey;
          localStorage.setItem('casper_public_key', walletPk);
          updateWalletUI();
          loadPortfolio(walletPk);
        }
      } catch (e) {
        console.error('Wallet connection failed:', e);
      }
    }

    function showConnectPrompt() {
      const app = document.getElementById('app');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content')?.remove();
      const prompt = document.createElement('div');
      prompt.id = 'content';
      prompt.className = 'connect-prompt';
      prompt.innerHTML = `
        <h2>🔌 Wallet Not Connected</h2>
        <p>Connect your Casper Wallet to view your portfolio.</p>
        <button onclick="toggleWallet()">Connect Wallet</button>
      `;
      app.appendChild(prompt);
    }

    /* ─── Portfolio ─── */
    async function loadPortfolio(pk) {
      const key = pk || walletPk;
      if (!key) { showConnectPrompt(); return; }
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content')?.remove();
      try {
        const res = await fetch('/api/portfolio?public_key=' + encodeURIComponent(key));
        const data = await res.json();
        portfolioData = data;
        render(data);
      } catch (e) {
        document.getElementById('loading').innerHTML = '<p style="color:#f87171">Failed to load portfolio. Is the server running?</p>';
      }
    }

    function render(data) {
      const loading = document.getElementById('loading');
      loading.style.display = 'none';

      const app = document.getElementById('app');

      const content = document.createElement('div');
      content.id = 'content';
      content.innerHTML = '';

      // Page header
      const headerDiv = document.createElement('div');
      headerDiv.className = 'page-header';
      headerDiv.innerHTML = `
        <div>
          <h2 class="page-title">Wallet Portfolio</h2>
          <p class="page-desc">Overview of your on-chain assets on Casper Testnet</p>
        </div>
        <div class="wallet-addr">
          <span>${data.wallet ? data.wallet.slice(0, 18) + '...' + data.wallet.slice(-6) : 'N/A'}</span>
          <button class="copy-btn" onclick="copyAddress()" title="Copy address">📋</button>
        </div>
      `;
      content.appendChild(headerDiv);

      // Refresh
      const refreshBar = document.createElement('div');
      refreshBar.className = 'refresh-bar';
      refreshBar.innerHTML = `<button class="refresh-btn" onclick="loadPortfolio('${walletPk}')" id="refreshBtn">⟳ Refresh</button>`;
      content.appendChild(refreshBar);

      // Summary cards
      const csprNum = parseFloat(data.cspr_balance) || 0;
      const tokenCount = (data.tokens || []).length;
      const nftCount = (data.nfts || []).length;
      const summary = document.createElement('div');
      summary.className = 'summary-grid';
      summary.innerHTML = `
        <div class="summary-card">
          <div class="label">💰 CSPR Balance</div>
          <div class="value cspr">${csprNum.toFixed(2)}</div>
          <div class="sub">Casper Testnet</div>
        </div>
        <div class="summary-card">
          <div class="label">🪙 CEP-18 Tokens</div>
          <div class="value tokens">${tokenCount}</div>
          <div class="sub">Standard tokens in wallet</div>
        </div>
        <div class="summary-card">
          <div class="label">🖼️ NFTs</div>
          <div class="value nfts">${nftCount}</div>
          <div class="sub">Owned by wallet</div>
        </div>
        <div class="summary-card">
          <div class="label">📜 Contracts</div>
          <div class="value contracts">${data.contracts ?? 0}</div>
          <div class="sub">Deployed to Testnet</div>
        </div>
      `;
      content.appendChild(summary);

      // Custom Tokens (Token Factory)
      const customTokensList = data.custom_tokens || [];
      const customTokensSection = document.createElement('div');
      customTokensSection.className = 'section';

      let tokenDetailsHtml = '';
      if (customTokensList.length > 0) {
        tokenDetailsHtml = `<div class="asset-grid">${customTokensList.map((t, idx) => `
          <div class="asset-card">
            <div class="row">
              <span class="name">${escapeHtml(t.name || 'Unknown')}</span>
              ${t.symbol ? `<span class="symbol">${escapeHtml(t.symbol)}</span>` : ''}
            </div>
            <div class="balance token-bal">${escapeHtml(t.total_supply || '')}</div>
            <div class="meta">${escapeHtml(t.decimals || 0)} decimals · total supply</div>
            <div class="meta">Token ID: ${idx}</div>
            <div class="meta">Tx: ${t.tx_hash ? escapeHtml(t.tx_hash.slice(0, 16)) + '...' : 'pending'}</div>
            <div class="meta" style="color:${t.status === 'pending' ? 'var(--accent-pink)' : 'var(--accent-green)'}">${t.status}</div>
            <button onclick="copyToClipboard('Token ID: ${idx}')" style="margin-top:8px;width:100%;padding:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);cursor:pointer;font-size:11px;font-weight:500;">📋 Copy ID</button>
          </div>
        `).join('')}</div>`;
      }

      customTokensSection.innerHTML = `
        <div class="section-title">
          🪙 Token Factory Tokens
          <span class="count">${customTokensList.length}</span>
        </div>
        ${customTokensList.length === 0
          ? '<div class="empty-state"><h4>No custom tokens deployed</h4><p>Use the modal in Chat to deploy tokens via the Token Factory contract.</p></div>'
          : tokenDetailsHtml
        }
      `;
      content.appendChild(customTokensSection);

      // Custom Collections (Collection Factory)
      const customCollectionsList = data.custom_collections || [];
      const collectionsSection = document.createElement('div');
      collectionsSection.className = 'section';
      collectionsSection.innerHTML = `
        <div class="section-title">
          🏛️ Collections
          <span class="count">${customCollectionsList.length}</span>
        </div>
        ${customCollectionsList.length === 0
          ? '<div class="empty-state"><h4>No collections created</h4><p>Use the chat to create a collection with "Create a collection called...".</p></div>'
          : `<div class="asset-grid">${customCollectionsList.map(c => `
            <div class="asset-card">
              <div class="row">
                <span class="name">${escapeHtml(c.name || 'Unknown')}</span>
                ${c.symbol ? `<span class="symbol">${escapeHtml(c.symbol)}</span>` : ''}
              </div>
              <div class="balance" style="color:var(--accent-teal);font-size:14px;">${escapeHtml(c.base_uri || '')}</div>
              <div class="meta">Mint price: ${formatCspr(c.mint_price)} CSPR · ID: ${escapeHtml(c.collection_id || '?')}</div>
              <div class="meta">Tx: ${c.tx_hash ? escapeHtml(c.tx_hash.slice(0, 16)) + '...' : 'pending'}</div>
              <div class="meta" style="color:${c.status === 'pending' ? 'var(--accent-pink)' : 'var(--accent-green)'}">${c.status}</div>
            </div>
          `).join('')}</div>`
        }
      `;
      content.appendChild(collectionsSection);

      // Custom NFTs (agent mints)
      const customNftsList = data.custom_nfts || [];
      const customNftsSection = document.createElement('div');
      customNftsSection.className = 'section';
      customNftsSection.innerHTML = `
        <div class="section-title">
          🖼️ Custom NFTs (Agent Minted)
          <span class="count">${customNftsList.length}</span>
        </div>
        ${customNftsList.length === 0
          ? '<div class="empty-state"><h4>No NFTs minted yet</h4><p>Use the chat to mint NFTs.</p></div>'
          : `<div class="asset-grid">${customNftsList.map(n => `
            <div class="asset-card">
              <div class="row">
                <span class="name">NFT${n.token_id ? ' #' + escapeHtml(n.token_id) : ''}</span>
                ${n.collection ? `<span class="symbol">${escapeHtml(n.collection)}</span>` : ''}
              </div>
              <div class="meta" style="font-size:12px;">${escapeHtml(n.metadata_uri ? n.metadata_uri.slice(0, 60) + (n.metadata_uri.length > 60 ? '...' : '') : 'No URI')}</div>
              ${n.recipient ? `<div class="meta">To: ${escapeHtml(n.recipient.slice(0, 18))}...</div>` : ''}
              <div class="meta">Contract: ${escapeHtml(n.contract_name || '?')}</div>
              <div class="meta" style="color:${n.status === 'pending' ? 'var(--accent-pink)' : 'var(--accent-green)'}">${n.status}</div>
            </div>
          `).join('')}</div>`
        }
      `;
      content.appendChild(customNftsSection);

      // CEP-18 Tokens section
      const tokensSection = document.createElement('div');
      tokensSection.className = 'section';
      const tokensList = data.tokens || [];
      tokensSection.innerHTML = `
        <div class="section-title">
          🪙 CEP-18 Token Balances
          <span class="count">${tokensList.length}</span>
        </div>
        ${tokensList.length === 0
          ? '<div class="empty-state"><h4>No CEP-18 tokens found</h4><p>Your wallet holds no standard CEP-18 tokens on Testnet. Custom Token Factory tokens are listed above.</p></div>'
          : `<div class="asset-grid">${tokensList.map(t => `
            <div class="asset-card">
              <div class="row">
                <span class="name">${escapeHtml(t.name || 'Unknown')}</span>
                ${t.symbol ? `<span class="symbol">${escapeHtml(t.symbol)}</span>` : ''}
              </div>
              <div class="balance token-bal">${formatBalance(t.balance)}</div>
              <div class="meta">Wallet holds ${formatBalance(t.balance)} ${escapeHtml(t.symbol || 'tokens')}</div>
            </div>
          `).join('')}</div>`
        }
      `;
      content.appendChild(tokensSection);

      // NFTs section
      const nftsSection = document.createElement('div');
      nftsSection.className = 'section';
      const nftsList = data.nfts || [];

      let nftDetailsHtml = '';
      if (nftsList.length > 0) {
        nftDetailsHtml = `<div class="asset-grid">${nftsList.map(n => `
          <div class="asset-card">
            <div class="row">
              <span class="name">NFT #${n.token_id || '?'}</span>
              ${n.collection ? `<span class="symbol">${escapeHtml(n.collection)}</span>` : ''}
            </div>
            <div class="balance nft-bal">${escapeHtml(n.metadata_uri ? n.metadata_uri.slice(0, 40) + '...' : 'No metadata')}</div>
            <div class="meta">Token ID: ${n.token_id || '?'}</div>
            ${n.listed ? `<div class="badge-status listed">Listed for ${n.price ? formatCspr(n.price) + ' CSPR' : 'sale'}</div>` : '<div class="badge-status unlisted">Not Listed</div>'}
            <button onclick="copyToClipboard('NFT ID: ${n.token_id}')" style="margin-top:8px;width:100%;padding:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);cursor:pointer;font-size:11px;font-weight:500;">📋 Copy ID</button>
          </div>
        `).join('')}</div>`;
      }

      nftsSection.innerHTML = `
        <div class="section-title">
          🖼️ NFTs
          <span class="count">${nftsList.length}</span>
        </div>
        ${nftsList.length === 0
          ? '<div class="empty-state"><h4>No NFTs yet</h4><p>Use the modal in Chat to mint NFTs via the NFT Marketplace contract.</p></div>'
          : nftDetailsHtml
        }
      `;
      content.appendChild(nftsSection);

      // Recent activity
      const deploys = data.recent_deploys || [];
      if (deploys.length > 0) {
        const activitySection = document.createElement('div');
        activitySection.className = 'section';
        activitySection.innerHTML = `
          <div class="section-title">📋 Recent Activity</div>
          <div class="asset-grid">${deploys.map(d => `
            <div class="asset-card">
              <div class="meta">${escapeHtml(d.type || 'Deploy')}</div>
              <div style="font-size:12px;color:var(--accent-teal);font-family:monospace;">${escapeHtml(d.hash || '')}...</div>
              <div class="meta">${escapeHtml(d.timestamp || '')}</div>
            </div>
          `).join('')}</div>
        `;
        content.appendChild(activitySection);
      }

      app.appendChild(content);
    }

    function formatCspr(motes) {
      if (!motes) return '0';
      const num = parseFloat(motes);
      if (isNaN(num)) return motes;
      return (num / 1_000_000_000).toLocaleString(undefined, {maximumFractionDigits: 2});
    }

    function formatBalance(val) {
      if (val === undefined || val === null) return '—';
      const num = typeof val === 'string' ? parseFloat(val) : val;
      if (isNaN(num)) return val;
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
      if (num >= 1_000) return (num / 1_000).toFixed(1) + 'K';
      return num.toLocaleString();
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function copyAddress() {
      if (portfolioData?.wallet) {
        navigator.clipboard.writeText(portfolioData.wallet);
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard: ' + text);
      }).catch(() => {
        alert('Failed to copy to clipboard');
      });
    }

    /* ─── Init ─── */
    updateWalletUI();
    if (window.casperWallet) {
      onWalletReady();
    } else {
      window.addEventListener('casperWallet:ready', onWalletReady);
      let attempts = 0;
      const poll = setInterval(function() {
        if (window.casperWallet) {
          clearInterval(poll);
          onWalletReady();
        }
        attempts++;
        if (attempts >= 20) clearInterval(poll);
      }, 250);
    }
  </script>
</body>
</html>
